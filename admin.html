<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de Administración · Ropa Equipo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <!-- SheetJS for Excel export -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="admin-page">

  <!-- ── HEADER ── -->
  <header class="app-header">
    <div class="header-inner">
      <div class="header-brand">
        <div class="brand-icon">⚙️</div>
        <div>
          <h1 class="brand-title">Administración</h1>
          <p class="brand-sub">Gestión de cobros y pedidos</p>
        </div>
      </div>
      <nav class="header-nav">
        <a href="index.html" class="nav-btn">
          <span class="nav-icon">🏠</span>
          <span class="nav-label">Ver Tienda</span>
        </a>
      </nav>
    </div>
  </header>

  <main id="view-dashboard" class="view active">
    <div class="container">

      <div class="page-hero">
        <h2 class="hero-title">Gestión de Pedidos</h2>
        <p class="hero-sub">Control de pagos, exportación a fábrica y resumen de stock.</p>
      </div>

      <!-- KPIs -->
      <div class="kpi-grid" id="kpi-grid">
        <div class="kpi-card">
          <p class="kpi-label">Total prendas</p>
          <p class="kpi-value" id="kpi-total">0</p>
        </div>
        <div class="kpi-card">
          <p class="kpi-label">Jugadores</p>
          <p class="kpi-value" id="kpi-players">0</p>
        </div>
        <div class="kpi-card">
          <p class="kpi-label">Pedidos</p>
          <p class="kpi-value" id="kpi-orders">0</p>
        </div>
      </div>

      <!-- Filtro + exportar -->
      <div class="toolbar">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input id="filter-input" type="text" placeholder="Filtrar por jugador, artículo, pago…" oninput="renderTable()" />
        </div>
        <div class="admin-actions">
          <button class="btn btn-primary" onclick="exportToExcel()">
            <span class="btn-icon">📊</span> Exportar Pedidos (Excel)
          </button>
          <button class="btn btn-secondary" onclick="exportAggregated()">
            <span class="btn-icon">🏗️</span> Resumen Producción (Chub/Paseo)
          </button>
          <button class="btn btn-secondary" onclick="exportToCSV()">
            <span class="btn-icon">📄</span> Exportar CSV
          </button>
        </div>
      </div>

      <!-- Tabla -->
      <div class="table-wrap card">
        <table id="orders-table">
          <thead>
            <tr>
              <th>Jugador</th>
              <th>Artículo</th>
              <th>Color</th>
              <th>Talla</th>
              <th>Pago</th>
              <th>Nombre</th>
              <th>Dorsal</th>
              <th class="col-delete"></th>
            </tr>
          </thead>
          <tbody id="orders-tbody">
            <tr id="empty-row">
              <td colspan="8" class="empty-cell">
                <div class="empty-state">
                  <div class="empty-icon">📭</div>
                  <p>Aún no hay pedidos registrados.</p>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </main>

  <!-- ── TOAST ── -->
  <div id="toast" class="toast" role="alert"></div>

  <!-- ── CONFIRM MODAL ── -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <p id="modal-text"></p>
      <div class="modal-actions">
        <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn-danger" id="modal-confirm">Eliminar</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
